name: Build and publish

on:
  push:
    branches:
      - master

jobs:
  buildAndPublish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn test
      - run: npm publish --access public
